<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Assistant Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h2>RAG Document Assistant</h2>
            <button id="new-chat-btn">New Chat</button>
        </header>
        <div id="chat-box" class="chat-box"></div>
        <div id="loading" class="loading hidden">Assistant is searching and writing...</div>
        <div class="chat-footer">
            <input type="text" id="message-input" placeholder="Ask something from the knowledge base..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
